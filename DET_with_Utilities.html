<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Expense Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h2 {
      color: #333;
    }
    input, button, select {
      margin: 5px;
      padding: 8px;
    }
    #expense-list {
      margin-top: 20px;
    }
    .highest {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Daily Expense Tracker</h2>

  <label>Description:</label>
  <input type="text" id="desc" placeholder="e.g. Groceries">

  <label>Amount:</label>
  <input type="number" id="amount" placeholder="e.g. 500">

  <label>Category:</label>
  <select id="category">
    <option value="">--Select--</option>
    <option value="Food">Food</option>
    <option value="Travel">Travel</option>
    <option value="Bills">Bills</option>
    <option value="Other">Other</option>
  </select>
  <button onclick="applyFilter()">Filter</button>

  <button onclick="addExpense()">Add Expense</button>

  <div id="expense-list"></div>
  <h3 id="total"></h3>
  <h3 id="highest"></h3>

  <script>
    let expenses = [];

    function addExpense() {
      let desc = document.getElementById("desc").value;
      let amount = parseFloat(document.getElementById("amount").value);
      let category = document.getElementById("category").value;

      if (desc && amount && category) {
        expenses.push({ description: desc, amount: amount, category: category });
        document.getElementById("desc").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("category").value = "";
        showExpenses();
      } else {
        alert("Please enter description, amount, and category!");
      }
    }

    function getTotal() {
      return expenses.reduce((total, exp) => total + exp.amount, 0);
    }

    function getMax() {
      return expenses.reduce((max, exp) => exp.amount > max.amount ? exp : max, expenses[0]);
    }



    function applyFilter() {
  let category = document.getElementById("category").value;
  let listDiv = document.getElementById("expense-list");

  if (category) {
    let filtered = filterByCategory(category);
    listDiv.innerHTML = `<h3>${category} Expenses:</h3>`;
    filtered.forEach(exp => {
      listDiv.innerHTML += `<p>${exp.description} (${exp.category}): ₹${exp.amount}</p>`;
    });
  } else {
    showExpenses(); // show all if no category selected
  }
}

      function filterByCategory(category) {
      return expenses.filter(exp => exp.category.toLowerCase() === category.toLowerCase());
    }
    
    function showExpenses() {
      let listDiv = document.getElementById("expense-list");
      listDiv.innerHTML = "<h3>Your Expenses:</h3>";

      expenses.forEach(exp => {
        listDiv.innerHTML += `<p>${exp.description} (${exp.category}): ₹${exp.amount}</p>`;
      });

      document.getElementById("total").innerText = "Total Expenses: ₹" + getTotal();

      if (expenses.length > 0) {
        let highest = getMax();
        document.getElementById("highest").innerHTML =
          "Highest Expense: <span class='highest'>" + highest.description + " - ₹" + highest.amount + "</span>";
      }
    }
  </script>
</body>
</html>
